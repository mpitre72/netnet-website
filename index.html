<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<title>Net Net | The Operating System for Small Service Firms</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<style>
  :root {
    --deep-violet: #1F194C;
    --net-net-purple: #6B5CE7;
    --goldenrod: #D4A843;
    --teal: #1B6B6D;
    --burnt-sienna: #C4633E;
    --green-flow: #5FCEA8;
    --cream: #F5EADB;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--deep-violet);
    font-family: 'Open Sans', sans-serif;
    color: var(--cream);
    overflow-x: hidden;
  }

  .scroll-spacer { height: 800vh; position: relative; }

  /* ========== OFFICE SVG — FIXED, CENTERED, 60vw, NEVER SCROLLS ========== */
  .office-layer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 60vw;
    z-index: 1;
    opacity: 0.08;
    pointer-events: none;
  }

  .office-svg {
    width: 100%;
    height: auto;
    display: block;
  }

  .office-svg path,
  .office-svg line,
  .office-svg rect,
  .office-svg circle,
  .office-svg polyline,
  .office-svg ellipse {
    fill: none;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  /* ========== LOGO — fixed, centered ========== */
  .logo-layer {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -55%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    align-items: center;
    pointer-events: none;
  }

  .logo-container { width: 280px; height: auto; }

  .scroll-cue {
    margin-top: 32px;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: var(--cream);
    opacity: 0;
    animation: fadeInCue 1s ease-out 2s forwards, floatCue 2.5s ease-in-out 3s infinite;
  }

  @keyframes fadeInCue { to { opacity: 0.5; } }
  @keyframes floatCue {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* ========== TEXT — fixed ========== */
  .text-layer {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    z-index: 15;
    pointer-events: none;
  }

  .ch1-line {
    position: absolute;
    text-align: center;
    width: 90%;
    max-width: 900px;
    left: 50%;
    transform: translateX(-50%);
    opacity: 0;
  }

  /*
    Text positioning math:
    SVG viewBox = 960 x 750, rendered at 60vw wide.
    Rendered height = 60vw * (750/960) = 46.875vw
    SVG top edge = 50vh - 23.4375vw
    Window top (y=20 of 750) ≈ SVG top + 1.25vw = 50vh - 22.2vw
    Chair bottom (y=645 of 750) ≈ SVG top + 40.3vw = 50vh + 16.9vw

    Line 1: ~30px above window top
    Line 2: ~30px below chair bottom
  */

  .ch1-line-1 {
    top: calc(50vh - 22.2vw - 80px);
    transform: translateX(-50%) translateY(-100%);
    font-size: clamp(2.8rem, 5vw, 4.5rem);
    font-weight: 300;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .ch1-line-2 {
    top: calc(50vh + 16.9vw + 30px);
    font-size: clamp(1.15rem, 1.8vw, 1.6rem);
    font-weight: 400;
    line-height: 1.7;
    max-width: 720px;
  }

  .ch1-line-3 {
    top: calc(50vh - 22.2vw - 80px);
    transform: translateX(-50%) translateY(-100%);
    font-size: clamp(2.8rem, 5vw, 4.5rem);
    font-weight: 300;
    line-height: 1.2;
    letter-spacing: -0.02em;
  }

  .rotating-word {
    color: var(--goldenrod);
    font-weight: 600;
    display: inline-block;
    min-width: 140px;
  }
</style>
</head>

<!-- TEXT LAYER -->
<div class="text-layer">
  <div class="ch1-line ch1-line-1">You built something real.</div>
  <div class="ch1-line ch1-line-2">
    You know your craft. You know your clients. You hired people you trust. You sell
    <span class="rotating-word">creative</span>
    work and deliver it through grit, instinct, and experience.
  </div>
  <div class="ch1-line ch1-line-3">For years, that was the whole system.</div>
</div>

<div class="scroll-spacer"></div>

<script>
gsap.registerPlugin(ScrollTrigger);

const officeLayer = document.querySelector('.office-layer');
const logoLayer = document.querySelector('.logo-layer');
const line1 = document.querySelector('.ch1-line-1');
const line2 = document.querySelector('.ch1-line-2');
const line3 = document.querySelector('.ch1-line-3');
const rotatingEl = document.querySelector('.rotating-word');

const words = ['creative', 'impactful', 'technical', 'revealing', 'custom'];
let wordIndex = 0;

/*
  Scroll budget (800vh):
  0-5%     = breathing room
  5-15%    = logo fades out
  5-28%    = SVG draw animation + office brightens to FULL (1.0)
  28-36%   = Line 1 fades in (above window)
  36-40%   = Line 1 glow
  40-44%   = Line 1 hold
  44-48%   = Line 1 fades out
  48-55%   = Line 2 fades in (below chair) + first word visible
  55-58%   = scroll to "impactful"
  58-61%   = scroll to "technical"
  61-64%   = scroll to "revealing"
  64-67%   = scroll to "custom"
  67-71%   = Line 2 fades out
  73-76%   = Office dims to 15% for contrast (breathing room)
  76-81%   = Line 3 fades in above window
  81-85%   = Line 3 glow + hold
  85-88%   = Line 3 hold
  88-91%   = Line 3 fades out
  91-100%  = Office fades out
*/

const laptopLogo = document.querySelector('.laptop-logo');

const masterTL = gsap.timeline({
  scrollTrigger: {
    trigger: '.scroll-spacer',
    start: 'top top',
    end: 'bottom bottom',
    scrub: 1,
  }
});

masterTL
  .to({}, { duration: 5 })

  // Logo fades out
  .to(logoLayer, { opacity: 0, duration: 10 })

  // Office brightens to FULL during draw phase
  .to(officeLayer, { opacity: 1, duration: 23 }, 5)

  // Laptop logo fades onto screen after draw completes
  .to(laptopLogo, { opacity: 1, duration: 4 }, 28)

  // Line 1 in (above window)
  .fromTo(line1, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 8 }, 28)
  .to(line1, { textShadow: '0 0 50px rgba(212, 168, 67, 0.3)', duration: 3 }, 36)
  .to(line1, { textShadow: '0 0 0px rgba(212, 168, 67, 0)', duration: 2 }, 39)
  .to(line1, { opacity: 1, duration: 4 }, 41)
  .to(line1, { opacity: 0, duration: 4 }, 44)

  // Line 2 in (below chair)
  .fromTo(line2, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 7 }, 48)

  // Scroll-driven word rotation: each word gets a scroll chunk
  .call(() => { rotatingEl.textContent = 'impactful'; }, null, 55)
  .call(() => { rotatingEl.textContent = 'technical'; }, null, 58)
  .call(() => { rotatingEl.textContent = 'revealing'; }, null, 61)
  .call(() => { rotatingEl.textContent = 'custom'; }, null, 64)

  // Line 2 fades out
  .to(line2, { opacity: 0, duration: 4 }, 67)

  // Office dims aggressively for Line 3 contrast
  .to(officeLayer, { opacity: 0.15, duration: 3 }, 73)

  // Line 3 above window (with breathing room after Line 2)
  .fromTo(line3, { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 5 }, 76)
  .to(line3, { textShadow: '0 0 50px rgba(212, 168, 67, 0.3)', duration: 2 }, 81)
  .to(line3, { textShadow: '0 0 0px rgba(212, 168, 67, 0)', duration: 2 }, 83)
  .to(line3, { opacity: 1, duration: 3 }, 85)
  .to(line3, { opacity: 0, duration: 3 }, 88)

  // Everything fades out together
  .to(officeLayer, { opacity: 0, duration: 9 }, 91);


// ========== SVG DRAW-ON-SCROLL ==========
function setupDrawOnScroll() {
  const groups = [
    { selector: '.svg-city', start: 0.05, end: 0.15 },
    { selector: '.svg-window', start: 0.06, end: 0.18 },
    { selector: '.svg-desk', start: 0.14, end: 0.22 },
    { selector: '.svg-laptop', start: 0.17, end: 0.24 },
    { selector: '.svg-mug', start: 0.20, end: 0.26 },
    { selector: '.svg-chair', start: 0.22, end: 0.30 },
    { selector: '.svg-plant', start: 0.26, end: 0.32 },
  ];

  groups.forEach(group => {
    const els = document.querySelectorAll(
      `${group.selector} path, ${group.selector} line, ${group.selector} rect, ${group.selector} polyline, ${group.selector} circle, ${group.selector} ellipse`
    );

    els.forEach(el => {
      let length;
      if (el.tagName === 'circle') {
        length = 2 * Math.PI * parseFloat(el.getAttribute('r'));
      } else if (el.tagName === 'rect') {
        length = 2 * (parseFloat(el.getAttribute('width')) + parseFloat(el.getAttribute('height')));
      } else if (el.tagName === 'line') {
        const x1=parseFloat(el.getAttribute('x1')), y1=parseFloat(el.getAttribute('y1'));
        const x2=parseFloat(el.getAttribute('x2')), y2=parseFloat(el.getAttribute('y2'));
        length = Math.sqrt(Math.pow(x2-x1,2) + Math.pow(y2-y1,2));
      } else {
        length = el.getTotalLength ? el.getTotalLength() : 200;
      }
      el.style.strokeDasharray = length;
      el.style.strokeDashoffset = length;
    });

    gsap.to(`${group.selector} path, ${group.selector} line, ${group.selector} rect, ${group.selector} polyline, ${group.selector} circle, ${group.selector} ellipse`, {
      strokeDashoffset: 0,
      ease: 'none',
      scrollTrigger: {
        trigger: '.scroll-spacer',
        start: `${group.start * 100}% top`,
        end: `${group.end * 100}% top`,
        scrub: 1,
      }
    });
  });
}

document.fonts.ready.then(() => { setupDrawOnScroll(); });
</script>
